<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리대시보드</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      /* 매트 컬러 팔레트 변수 설정 */
      :root {
        --bg-color: #f4f6f8; /* 차분한 라이트 그레이 배경 */
        --card-bg: #ffffff; /* 카드 배경 (화이트) */
        --text-main: #333d45; /* 텍스트 기본 (다크 차콜) */
        --text-muted: #828c94; /* 보조 텍스트 (매트 그레이) */
        --border-color: #e4e8eb; /* 연한 테두리 */

        --primary-matte: #5c7285; /* 메인 테마색 (매트 네이비/슬레이트) */
        --primary-hover: #4a5c6b;

        --success-matte: #6b8e73; /* 성공/긍정 (매트 세이지 그린) */
        --danger-matte: #c4767b; /* 경고/오차 (매트 로즈/레드) */

        --cheat-bg: #fdfaf3; /* 치팅데이 배경 (아주 연한 웜톤) */
        --cheat-text: #b89258; /* 치팅데이 텍스트 (매트 머스타드) */

        --input-bg: #fbfcfd; /* 입력칸 배경 */
      }

      * {
        box-sizing: border-box;
      }

      body,
      input,
      select,
      button,
      textarea {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 40px 20px;
        line-height: 1.5;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: var(--text-main);
        font-weight: 700;
        font-size: 2.2em;
        margin-bottom: 40px;
        letter-spacing: -0.03em;
      }

      h2 {
        color: var(--primary-matte);
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 25px;
        font-size: 1.15em;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--border-color);
      }

      .card {
        background: var(--card-bg);
        padding: 35px 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        margin-bottom: 30px;
        border: 1px solid var(--border-color);
      }

      .input-group {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 20px;
      }

      .input-item {
        flex: 1;
        min-width: 180px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.9em;
        color: var(--text-muted);
      }

      input[type="number"],
      input[type="date"],
      select {
        width: 100%;
        padding: 12px 16px;
        background-color: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-main);
        font-size: 1em;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--primary-matte);
        box-shadow: 0 0 0 3px rgba(92, 114, 133, 0.15);
        background-color: var(--card-bg);
      }

      button.primary-btn {
        width: 100%;
        padding: 16px;
        background-color: var(--primary-matte);
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 1.05em;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 15px;
      }

      button.primary-btn:hover {
        background-color: var(--primary-hover);
      }

      button.reset-btn {
        background-color: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        margin-top: 10px;
      }

      button.reset-btn:hover {
        border-color: var(--danger-matte);
        color: var(--danger-matte);
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 10px;
      }

      .result-box {
        background: var(--input-bg);
        padding: 25px 20px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .result-box.highlight {
        background: rgba(107, 142, 115, 0.05);
        border: 2px solid var(--success-matte);
      }

      .result-box h3 {
        margin: 0 0 10px 0;
        font-size: 0.9em;
        font-weight: 600;
        color: var(--text-muted);
      }

      .result-box p {
        margin: 0;
        font-size: 1.8em;
        font-weight: 700;
        color: var(--text-main);
      }

      .result-box.highlight p {
        color: var(--success-matte);
      }

      .warning-text {
        color: var(--danger-matte);
        font-size: 0.85em;
        margin-top: 10px;
        font-weight: 600;
      }

      #res-cheat-info {
        color: var(--cheat-text);
        background-color: var(--cheat-bg);
        border: 1px solid rgba(184, 146, 88, 0.3);
        border-radius: 6px;
        display: inline-block;
        padding: 4px 10px;
        font-size: 0.8em;
        margin-top: 12px;
        font-weight: 600;
      }

      /* 테이블 스타일링 */
      .table-container {
        overflow-x: auto;
        max-height: 650px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        /* 테이블 안쪽 스크롤 시 모서리 둥글게 유지 */
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.95em;
        min-width: 1000px;
        background-color: var(--card-bg);
      }

      thead th {
        position: sticky;
        top: 0;
        background-color: #fcfcfd;
        z-index: 1;
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.85em;
        padding: 16px 10px;
        border-bottom: 1px solid var(--border-color);
      }

      th,
      td {
        padding: 14px 10px;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        vertical-align: middle;
      }

      td {
        color: var(--text-main);
        font-weight: 400;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background-color: var(--bg-color);
      }

      .cheat-day-row td {
        background-color: var(--cheat-bg);
      }

      .cheat-badge {
        color: var(--cheat-text);
        font-size: 0.75em;
        margin-top: 4px;
        display: inline-block;
        font-weight: 600;
      }

      .status-select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background-color: var(--card-bg);
        color: var(--text-main);
        cursor: pointer;
        font-weight: 500;
        font-size: 0.9em;
      }

      .table-input {
        width: 75px;
        padding: 8px;
        text-align: center;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background-color: var(--card-bg);
        color: var(--text-main);
        font-weight: 500;
      }

      .weight-input {
        background-color: #f1f4f6; /* 체중 입력칸 시각적 분리 */
        border-color: #d1d8dd;
      }

      /* 수치 표기 (매트 컬러 적용) */
      .deficit-positive,
      .goal-text,
      .error-good {
        color: var(--success-matte);
        font-weight: 600;
      }

      .deficit-negative,
      .error-bad {
        color: var(--danger-matte);
        font-weight: 600;
      }

      .desc-text {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9em;
        margin-bottom: 25px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>관리대시보드</h1>

      <div class="card">
        <h2>설정 및 정보</h2>
        <div class="input-group">
          <div class="input-item">
            <label>키 (cm)</label>
            <input type="number" id="height" value="177" />
          </div>
          <div class="input-item">
            <label>시작 몸무게 (kg)</label>
            <input type="number" id="weight" value="88" />
          </div>
          <div class="input-item">
            <label>만 나이</label>
            <input type="number" id="age" value="34" />
          </div>
        </div>
        <div class="input-group">
          <div class="input-item">
            <label>성별</label>
            <select id="gender">
              <option value="male">남성</option>
              <option value="female">여성</option>
            </select>
          </div>
          <div class="input-item">
            <label>평소 활동량</label>
            <select id="activity">
              <option value="1.2">거의 운동하지 않음</option>
              <option value="1.375" selected>가벼운 활동 (주 1~3일)</option>
              <option value="1.55">보통 활동 (주 3~5일)</option>
              <option value="1.725">적극적 활동 (매일)</option>
            </select>
          </div>
          <div class="input-item">
            <label>치팅데이 설정 (주 1회 3000kcal)</label>
            <select id="cheat-day">
              <option value="none">설정 안 함</option>
              <option value="0" selected>일요일</option>
              <option value="1">월요일</option>
              <option value="2">화요일</option>
              <option value="3">수요일</option>
              <option value="4">목요일</option>
              <option value="5">금요일</option>
              <option value="6">토요일</option>
            </select>
          </div>
        </div>
        <div
          class="input-group"
          style="
            padding-top: 10px;
            border-top: 1px dashed var(--border-color);
            margin-top: 25px;
          ">
          <div class="input-item">
            <label style="color: var(--primary-matte)">목표 날짜</label>
            <input type="date" id="target-date" value="2026-05-30" />
          </div>
          <div class="input-item">
            <label style="color: var(--primary-matte)">목표 체중 (kg)</label>
            <input type="number" id="target-weight" value="65" step="0.1" />
          </div>
        </div>
        <button class="primary-btn" onclick="generateSchedule()">
          일정표 생성 및 업데이트
        </button>
        <button class="primary-btn reset-btn" onclick="clearData()">
          기록 전체 초기화
        </button>
      </div>

      <div class="card" id="result-card" style="display: none">
        <h2>데이터 요약</h2>
        <div class="result-grid">
          <div class="result-box">
            <h3>유지 칼로리 (TDEE)</h3>
            <p id="res-tdee">-</p>
            <div
              style="
                font-size: 0.85em;
                color: var(--text-muted);
                margin-top: 8px;
              ">
              기초대사량: <span id="res-bmr"></span> kcal
            </div>
          </div>
          <div class="result-box" id="intake-box">
            <h3>일반일 목표 섭취량</h3>
            <p id="res-target">-</p>
            <div id="res-cheat-info">치팅데이 설정 없음</div>
            <div id="res-warning" class="warning-text"></div>
          </div>
          <div class="result-box highlight">
            <h3>목표일 예상 체중</h3>
            <p id="res-final-weight">- kg</p>
          </div>
        </div>
      </div>

      <div class="card" id="schedule-card" style="display: none">
        <h2>실전 기록장</h2>
        <p id="table-desc" class="desc-text">
          목표 체중과 날짜를 변경하면 남은 일정이 실시간으로 재계산됩니다.
        </p>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>남은 일수</th>
                <th>목표 섭취량</th>
                <th>권장 운동</th>
                <th>달성 여부</th>
                <th>실제 섭취</th>
                <th>실제 운동</th>
                <th>일일 마진</th>
                <th>예상 체중</th>
                <th style="background-color: #f1f4f6">실제 체중</th>
                <th>오차</th>
              </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      let scheduleData = [];
      let startWeight = 0;
      let baseTDEE = 0;
      let savedRecords = {};

      const weekNames = [
        "일요일",
        "월요일",
        "화요일",
        "수요일",
        "목요일",
        "금요일",
        "토요일",
      ];

      window.onload = function () {
        loadFromLocalStorage();
      };

      function loadFromLocalStorage() {
        const data = localStorage.getItem("dietProData_v6");
        if (data) {
          const parsed = JSON.parse(data);
          if (parsed.info) {
            document.getElementById("height").value = parsed.info.height;
            document.getElementById("weight").value = parsed.info.weight;
            document.getElementById("age").value = parsed.info.age;
            document.getElementById("gender").value = parsed.info.gender;
            document.getElementById("activity").value = parsed.info.activity;
            document.getElementById("target-date").value =
              parsed.info.targetDate;
            document.getElementById("target-weight").value =
              parsed.info.targetWeight || "";
            if (parsed.info.cheatDay)
              document.getElementById("cheat-day").value = parsed.info.cheatDay;
          }
          savedRecords = parsed.records || {};
          generateSchedule();
        }
      }

      function saveToLocalStorage() {
        const info = {
          height: document.getElementById("height").value,
          weight: document.getElementById("weight").value,
          age: document.getElementById("age").value,
          gender: document.getElementById("gender").value,
          activity: document.getElementById("activity").value,
          targetDate: document.getElementById("target-date").value,
          targetWeight: document.getElementById("target-weight").value,
          cheatDay: document.getElementById("cheat-day").value,
        };
        const dataToSave = { info: info, records: savedRecords };
        localStorage.setItem("dietProData_v6", JSON.stringify(dataToSave));
      }

      function clearData() {
        if (confirm("정말 모든 기록을 삭제하시겠습니까? 복구할 수 없습니다.")) {
          localStorage.removeItem("dietProData_v6");
          location.reload();
        }
      }

      function generateSchedule() {
        const h = parseFloat(document.getElementById("height").value);
        startWeight = parseFloat(document.getElementById("weight").value);
        const a = parseInt(document.getElementById("age").value);
        const gender = document.getElementById("gender").value;
        const activity = parseFloat(document.getElementById("activity").value);
        const targetDateStr = document.getElementById("target-date").value;
        const targetWeight = parseFloat(
          document.getElementById("target-weight").value,
        );
        const cheatDayValue = document.getElementById("cheat-day").value;

        if (!h || !startWeight || !a || !targetDateStr || !targetWeight)
          return alert("모든 값을 정확히 입력하세요.");

        let bmr =
          gender === "male"
            ? 10 * startWeight + 6.25 * h - 5 * a + 5
            : 10 * startWeight + 6.25 * h - 5 * a - 161;
        bmr = Math.round(bmr);
        baseTDEE = Math.round(bmr * activity);

        const startDate = new Date(2026, 2, 9);
        const endDate = new Date(targetDateStr);
        let totalDays = Math.round(
          (endDate - startDate) / (1000 * 60 * 60 * 24),
        );

        if (totalDays <= 0) return alert("목표 날짜는 시작일 이후여야 합니다.");

        let weightToLose = startWeight - targetWeight;
        let totalCalorieDeficit = weightToLose * 7700;
        let requiredDailyDeficit = totalCalorieDeficit / totalDays;
        let plannedExercise = 300;

        let avgPlannedIntake =
          baseTDEE + plannedExercise - requiredDailyDeficit;

        let hasCheatDay = cheatDayValue !== "none";
        let cheatDayIndex = hasCheatDay ? parseInt(cheatDayValue) : -1;
        let normalDayIntake;

        if (hasCheatDay) {
          normalDayIntake = Math.round((7 * avgPlannedIntake - 3000) / 6);
          document.getElementById("res-cheat-info").innerText =
            `치팅데이 할당: ${weekNames[cheatDayIndex]}`;
          document.getElementById("res-cheat-info").style.display =
            "inline-block";
          document.getElementById("table-desc").innerText =
            `매주 ${weekNames[cheatDayIndex]}은 3,000kcal 치팅데이로 반영되어 있습니다.`;
        } else {
          normalDayIntake = Math.round(avgPlannedIntake);
          document.getElementById("res-cheat-info").style.display = "none";
          document.getElementById("table-desc").innerText =
            `치팅데이 없이 일정한 섭취량으로 계산됩니다.`;
        }

        const warningEl = document.getElementById("res-warning");
        if (normalDayIntake < bmr && normalDayIntake > 0) {
          warningEl.innerText = `[주의] 기초대사량(${bmr}kcal) 미만입니다. 목표 조정을 권장합니다.`;
        } else if (normalDayIntake <= 0) {
          warningEl.innerText = `[경고] 불가능한 일정입니다. 섭취 칼로리가 부족합니다.`;
        } else {
          warningEl.innerText = ``;
        }

        document.getElementById("res-tdee").innerText =
          baseTDEE.toLocaleString() + " kcal";
        document.getElementById("res-bmr").innerText = bmr.toLocaleString();
        document.getElementById("res-target").innerText =
          normalDayIntake.toLocaleString() + " kcal";

        document.getElementById("result-card").style.display = "block";
        document.getElementById("schedule-card").style.display = "block";

        scheduleData = [];
        let current = new Date(startDate);

        while (current <= endDate) {
          let keyDate = `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, "0")}-${String(current.getDate()).padStart(2, "0")}`;
          let daysLeft = Math.round(
            (endDate - current) / (1000 * 60 * 60 * 24),
          );

          let record = savedRecords[keyDate] || {
            status: "none",
            actualIntake: null,
            actualExercise: null,
            actualWeight: null,
          };

          let isCheatDay = hasCheatDay && current.getDay() === cheatDayIndex;
          let todayTargetIntake = isCheatDay ? 3000 : normalDayIntake;

          scheduleData.push({
            key: keyDate,
            dateStr: `${current.getMonth() + 1}/${String(current.getDate()).padStart(2, "0")}`,
            daysLeft: `D-${daysLeft}`,
            isCheatDay: isCheatDay,
            plannedIntake: todayTargetIntake,
            plannedExercise: plannedExercise,
            status: record.status,
            actualIntake: record.actualIntake,
            actualExercise: record.actualExercise,
            actualWeight: record.actualWeight,
          });
          current.setDate(current.getDate() + 1);
        }

        renderTable();
        saveToLocalStorage();
      }

      function renderTable() {
        const tbody = document.getElementById("schedule-body");
        tbody.innerHTML = "";

        scheduleData.forEach((day, index) => {
          const tr = document.createElement("tr");

          if (day.isCheatDay) tr.className = "cheat-day-row";

          let statusSelect = `
                <select class="status-select" onchange="updateStatus(${index}, this.value)">
                    <option value="none" ${day.status === "none" ? "selected" : ""}>대기</option>
                    <option value="success" ${day.status === "success" ? "selected" : ""}>성공</option>
                    <option value="fail" ${day.status === "fail" ? "selected" : ""}>수정</option>
                </select>
            `;

          let dateHtml = day.dateStr;
          if (day.isCheatDay)
            dateHtml += `<br><span class="cheat-badge">치팅</span>`;

          tr.innerHTML = `
                <td style="font-weight: 600;">${dateHtml}</td>
                <td style="color:var(--text-muted); font-size:0.9em;">${day.daysLeft}</td>
                <td class="goal-text">${day.plannedIntake}</td>
                <td style="color:var(--text-muted);">+${day.plannedExercise}</td>
                <td>${statusSelect}</td>
                <td id="td-intake-${index}"></td>
                <td id="td-exercise-${index}"></td>
                <td id="margin-${index}">-</td>
                <td id="weight-${index}" style="font-weight:700;">-</td>
                <td style="background-color: var(--input-bg);">
                    <input type="number" step="0.1" class="table-input weight-input" placeholder="0.0" value="${day.actualWeight || ""}" oninput="updateWeight(${index}, this.value)">
                </td>
                <td id="error-${index}">-</td>
            `;
          tbody.appendChild(tr);
          updateRowUI(index);
        });
        calculateProjections();
      }

      function updateStatus(index, val) {
        scheduleData[index].status = val;
        updateRowUI(index);
        syncToSavedRecords(index);
        calculateProjections();
      }

      function updateRowUI(index) {
        const day = scheduleData[index];
        const tdIntake = document.getElementById(`td-intake-${index}`);
        const tdExercise = document.getElementById(`td-exercise-${index}`);

        if (day.status === "success") {
          tdIntake.innerHTML = `<span style="color:var(--text-muted);">${day.plannedIntake}</span>`;
          tdExercise.innerHTML = `<span style="color:var(--text-muted);">${day.plannedExercise}</span>`;
          day.actualIntake = day.plannedIntake;
          day.actualExercise = day.plannedExercise;
        } else if (day.status === "fail") {
          tdIntake.innerHTML = `<input type="number" class="table-input" placeholder="${day.plannedIntake}" value="${day.actualIntake || ""}" oninput="updateData(${index}, 'actualIntake', this.value)">`;
          tdExercise.innerHTML = `<input type="number" class="table-input" placeholder="${day.plannedExercise}" value="${day.actualExercise || ""}" oninput="updateData(${index}, 'actualExercise', this.value)">`;
        } else {
          tdIntake.innerHTML = `<span style="color:var(--border-color);">-</span>`;
          tdExercise.innerHTML = `<span style="color:var(--border-color);">-</span>`;
          day.actualIntake = null;
          day.actualExercise = null;
        }
      }

      function updateData(index, field, value) {
        scheduleData[index][field] = value;
        syncToSavedRecords(index);
        calculateProjections();
      }

      function updateWeight(index, value) {
        scheduleData[index].actualWeight = value;
        syncToSavedRecords(index);
        calculateProjections();
      }

      function syncToSavedRecords(index) {
        let day = scheduleData[index];
        savedRecords[day.key] = {
          status: day.status,
          actualIntake: day.actualIntake,
          actualExercise: day.actualExercise,
          actualWeight: day.actualWeight,
        };
        saveToLocalStorage();
      }

      function calculateProjections() {
        let currentW = startWeight;

        scheduleData.forEach((day, index) => {
          let intake = day.plannedIntake;
          let exercise = day.plannedExercise;

          if (day.status === "success") {
            intake = day.plannedIntake;
            exercise = day.plannedExercise;
          } else if (day.status === "fail") {
            intake =
              day.actualIntake !== null && day.actualIntake !== ""
                ? parseInt(day.actualIntake)
                : day.plannedIntake;
            exercise =
              day.actualExercise !== null && day.actualExercise !== ""
                ? parseInt(day.actualExercise)
                : day.plannedExercise;
          }

          let totalBurn = baseTDEE + exercise;
          let dailyMargin = totalBurn - intake;
          let weightChange = dailyMargin / 7700;
          currentW -= weightChange;

          const marginTd = document.getElementById(`margin-${index}`);
          if (dailyMargin > 0)
            marginTd.innerHTML = `<span class="deficit-positive">-${dailyMargin}</span>`;
          else if (dailyMargin < 0)
            marginTd.innerHTML = `<span class="deficit-negative">+${Math.abs(dailyMargin)}</span>`;
          else marginTd.innerText = "0";

          document.getElementById(`weight-${index}`).innerText =
            currentW.toFixed(2);

          const errorTd = document.getElementById(`error-${index}`);
          if (day.actualWeight !== null && day.actualWeight !== "") {
            let actual = parseFloat(day.actualWeight);
            let diff = actual - currentW;

            if (diff > 0)
              errorTd.innerHTML = `<span class="error-bad">+${diff.toFixed(2)}</span>`;
            else
              errorTd.innerHTML = `<span class="error-good">${diff.toFixed(2)}</span>`;
          } else {
            errorTd.innerText = "-";
          }
        });

        document.getElementById("res-final-weight").innerText =
          currentW.toFixed(2) + " kg";
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리 대시보드</title>
    <style>
      body {
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        background-color: #f8f9fa;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 1200px; /* 테이블이 넓어져서 폭을 조금 더 키웠습니다 */
        margin: 0 auto;
      }
      h1,
      h2 {
        text-align: center;
        color: #2c3e50;
      }
      .card {
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }
      .input-group {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 15px;
      }
      .input-item {
        flex: 1;
        min-width: 150px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        font-size: 0.9em;
        color: #555;
      }
      input[type="number"],
      input[type="date"],
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1em;
      }
      button.primary-btn {
        width: 100%;
        padding: 15px;
        background-color: #27ae60;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1em;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      button.primary-btn:hover {
        background-color: #219653;
      }
      button.reset-btn {
        background-color: #e74c3c;
        margin-top: 10px;
      }
      button.reset-btn:hover {
        background-color: #c0392b;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }
      .result-box {
        background: #f1f8f5;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }
      .result-box.highlight {
        background: #e8f5e9;
        border: 2px solid #a5d6a7;
      }
      .result-box h3 {
        margin: 0 0 10px 0;
        font-size: 0.95em;
        color: #666;
      }
      .result-box p {
        margin: 0;
        font-size: 1.5em;
        font-weight: bold;
        color: #2c3e50;
      }
      .result-box.highlight p {
        color: #27ae60;
        font-size: 1.8em;
      }

      /* 테이블 스타일링 */
      .table-container {
        overflow-x: auto;
        max-height: 600px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        font-size: 0.9em;
        min-width: 1000px;
      }
      thead th {
        position: sticky;
        top: 0;
        background-color: #f8f9fa;
        z-index: 1;
        box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.1);
      }
      th,
      td {
        padding: 10px 8px;
        text-align: center;
        border-bottom: 1px solid #eee;
        vertical-align: middle;
      }
      th {
        color: #555;
        font-weight: bold;
      }
      tr:hover {
        background-color: #fafafa;
      }
      .status-select {
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background-color: #fff;
        cursor: pointer;
        font-weight: bold;
      }
      .table-input {
        width: 65px;
        padding: 6px;
        text-align: center;
        border: 1px solid #aaa;
        border-radius: 6px;
        background-color: #fffacd;
        font-weight: bold;
      }
      .weight-input {
        background-color: #e8f4f8; /* 몸무게 입력칸은 파란색 톤으로 구분 */
      }
      .table-input:focus {
        background-color: #fff;
        outline: 2px solid #3498db;
      }
      .deficit-positive {
        color: #27ae60;
        font-weight: bold;
      }
      .deficit-negative {
        color: #e74c3c;
        font-weight: bold;
      }
      .goal-text {
        color: #27ae60;
        font-weight: bold;
      }
      .error-good {
        color: #3498db;
        font-weight: bold;
      } /* 예상보다 더 빠짐 */
      .error-bad {
        color: #e74c3c;
        font-weight: bold;
      } /* 예상보다 덜 빠짐 */
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📈 다이내믹 체중 관리 PRO</h1>

      <div class="card">
        <h2>설정 및 정보</h2>
        <div class="input-group">
          <div class="input-item">
            <label>키 (cm)</label>
            <input type="number" id="height" value="177" />
          </div>
          <div class="input-item">
            <label>시작 몸무게 (kg)</label>
            <input type="number" id="weight" value="88" />
          </div>
          <div class="input-item">
            <label>만 나이</label>
            <input type="number" id="age" value="34" />
          </div>
        </div>
        <div class="input-group">
          <div class="input-item">
            <label>성별</label>
            <select id="gender">
              <option value="male">남성</option>
              <option value="female">여성</option>
            </select>
          </div>
          <div class="input-item">
            <label>평소 활동량</label>
            <select id="activity">
              <option value="1.2">거의 운동하지 않음</option>
              <option value="1.375" selected>가벼운 활동 (주 1~3일)</option>
              <option value="1.55">보통 활동 (주 3~5일)</option>
              <option value="1.725">적극적 활동 (매일)</option>
            </select>
          </div>
          <div class="input-item">
            <label>🎯 목표 날짜 (자유 변경)</label>
            <input type="date" id="target-date" value="2026-05-30" />
          </div>
        </div>
        <button class="primary-btn" onclick="generateSchedule()">
          일정표 생성 / 업데이트
        </button>
        <button class="primary-btn reset-btn" onclick="clearData()">
          기록 전체 초기화
        </button>
      </div>

      <div class="card" id="result-card" style="display: none">
        <h2>📊 데이터 요약</h2>
        <div class="result-grid">
          <div class="result-box">
            <h3>유지 칼로리 (TDEE)</h3>
            <p id="res-tdee">-</p>
          </div>
          <div class="result-box">
            <h3>하루 목표 섭취량</h3>
            <p id="res-target">-</p>
          </div>
          <div class="result-box highlight">
            <h3>🔥 목표일 예상 체중</h3>
            <p id="res-final-weight">- kg</p>
          </div>
        </div>
      </div>

      <div class="card" id="schedule-card" style="display: none">
        <h2>📅 실전 기록장 (오차 추적)</h2>
        <p
          style="
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 20px;
          ">
          ※ 목표 날짜를 바꿔도 기존에 입력한 데이터는 날아가지 않습니다. 자동
          저장됩니다!
        </p>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>남은 일수</th>
                <th>목표 섭취량</th>
                <th>권장 운동</th>
                <th>달성 여부</th>
                <th>실제 섭취</th>
                <th>실제 운동</th>
                <th>일일 마진</th>
                <th>예상 체중</th>
                <th style="background-color: #e8f4f8">실제 체중</th>
                <th>오차</th>
              </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      let scheduleData = [];
      let startWeight = 0;
      let baseTDEE = 0;
      let savedRecords = {}; // 로컬스토리지 저장용 객체

      // 페이지 로드 시 기존 데이터 불러오기
      window.onload = function () {
        loadFromLocalStorage();
      };

      function loadFromLocalStorage() {
        const data = localStorage.getItem("dietProData");
        if (data) {
          const parsed = JSON.parse(data);
          // 기본 정보 세팅
          if (parsed.info) {
            document.getElementById("height").value = parsed.info.height;
            document.getElementById("weight").value = parsed.info.weight;
            document.getElementById("age").value = parsed.info.age;
            document.getElementById("gender").value = parsed.info.gender;
            document.getElementById("activity").value = parsed.info.activity;
            document.getElementById("target-date").value =
              parsed.info.targetDate;
          }
          // 날짜별 기록 세팅
          savedRecords = parsed.records || {};
          // 자동으로 표 생성
          generateSchedule();
        }
      }

      function saveToLocalStorage() {
        const info = {
          height: document.getElementById("height").value,
          weight: document.getElementById("weight").value,
          age: document.getElementById("age").value,
          gender: document.getElementById("gender").value,
          activity: document.getElementById("activity").value,
          targetDate: document.getElementById("target-date").value,
        };
        const dataToSave = {
          info: info,
          records: savedRecords,
        };
        localStorage.setItem("dietProData", JSON.stringify(dataToSave));
      }

      function clearData() {
        if (confirm("정말 모든 기록을 삭제하시겠습니까? 복구할 수 없습니다.")) {
          localStorage.removeItem("dietProData");
          location.reload();
        }
      }

      function generateSchedule() {
        const h = parseFloat(document.getElementById("height").value);
        startWeight = parseFloat(document.getElementById("weight").value);
        const a = parseInt(document.getElementById("age").value);
        const gender = document.getElementById("gender").value;
        const activity = parseFloat(document.getElementById("activity").value);
        const targetDateStr = document.getElementById("target-date").value;

        if (!h || !startWeight || !a || !targetDateStr)
          return alert("모든 값을 정확히 입력하세요.");

        // 기초/활동 대사량
        let bmr =
          gender === "male"
            ? 10 * startWeight + 6.25 * h - 5 * a + 5
            : 10 * startWeight + 6.25 * h - 5 * a - 161;
        bmr = Math.round(bmr);
        baseTDEE = Math.round(bmr * activity);

        let plannedIntake = baseTDEE - 600;
        if (plannedIntake < bmr) plannedIntake = bmr;
        let plannedExercise = 300;

        document.getElementById("res-tdee").innerText =
          baseTDEE.toLocaleString() + " kcal";
        document.getElementById("res-target").innerText =
          plannedIntake.toLocaleString() + " kcal";

        document.getElementById("result-card").style.display = "block";
        document.getElementById("schedule-card").style.display = "block";

        scheduleData = [];
        const startDate = new Date(2026, 2, 9); // 고정 시작일: 3월 9일
        const endDate = new Date(targetDateStr);

        if (endDate < startDate)
          return alert("목표 날짜는 시작일(3월 9일) 이후여야 합니다.");

        let current = new Date(startDate);

        while (current <= endDate) {
          // 날짜를 고유 키(YYYY-MM-DD)로 사용해 기록 보존
          let keyDate = `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, "0")}-${String(current.getDate()).padStart(2, "0")}`;
          let daysLeft = Math.round(
            (endDate - current) / (1000 * 60 * 60 * 24),
          );

          // 저장된 기록이 있으면 불러오고, 없으면 기본값
          let record = savedRecords[keyDate] || {
            status: "none",
            actualIntake: null,
            actualExercise: null,
            actualWeight: null,
          };

          scheduleData.push({
            key: keyDate,
            dateStr: `${current.getMonth() + 1}/${current.getDate()}`,
            daysLeft: `D-${daysLeft}`,
            plannedIntake: plannedIntake,
            plannedExercise: plannedExercise,
            status: record.status,
            actualIntake: record.actualIntake,
            actualExercise: record.actualExercise,
            actualWeight: record.actualWeight,
          });
          current.setDate(current.getDate() + 1);
        }

        renderTable();
        saveToLocalStorage(); // 설정 정보가 바뀌었을 수 있으니 저장
      }

      function renderTable() {
        const tbody = document.getElementById("schedule-body");
        tbody.innerHTML = "";

        scheduleData.forEach((day, index) => {
          const tr = document.createElement("tr");

          let statusSelect = `
                <select class="status-select" onchange="updateStatus(${index}, this.value)">
                    <option value="none" ${day.status === "none" ? "selected" : ""}>➖ 대기중</option>
                    <option value="success" ${day.status === "success" ? "selected" : ""}>✅ 지킴</option>
                    <option value="fail" ${day.status === "fail" ? "selected" : ""}>❌ 수정</option>
                </select>
            `;

          tr.innerHTML = `
                <td>${day.dateStr}</td>
                <td style="color:#aaa; font-size:0.9em;">${day.daysLeft}</td>
                <td class="goal-text">${day.plannedIntake}</td>
                <td style="color:#7f8c8d;">+${day.plannedExercise}</td>
                <td>${statusSelect}</td>
                <td id="td-intake-${index}"></td>
                <td id="td-exercise-${index}"></td>
                <td id="margin-${index}">-</td>
                <td id="weight-${index}" style="font-weight:bold; color:#2c3e50;">-</td>
                <td style="background-color: #f4fbff;">
                    <input type="number" step="0.1" class="table-input weight-input" placeholder="기록" value="${day.actualWeight || ""}" oninput="updateWeight(${index}, this.value)">
                </td>
                <td id="error-${index}">-</td>
            `;
          tbody.appendChild(tr);
          updateRowUI(index);
        });
        calculateProjections();
      }

      function updateStatus(index, val) {
        scheduleData[index].status = val;
        updateRowUI(index);
        syncToSavedRecords(index);
        calculateProjections();
      }

      function updateRowUI(index) {
        const day = scheduleData[index];
        const tdIntake = document.getElementById(`td-intake-${index}`);
        const tdExercise = document.getElementById(`td-exercise-${index}`);

        if (day.status === "success") {
          tdIntake.innerHTML = `<span style="color:#7f8c8d;">${day.plannedIntake}</span>`;
          tdExercise.innerHTML = `<span style="color:#7f8c8d;">${day.plannedExercise}</span>`;
          day.actualIntake = day.plannedIntake;
          day.actualExercise = day.plannedExercise;
        } else if (day.status === "fail") {
          tdIntake.innerHTML = `<input type="number" class="table-input" placeholder="${day.plannedIntake}" value="${day.actualIntake || ""}" oninput="updateData(${index}, 'actualIntake', this.value)">`;
          tdExercise.innerHTML = `<input type="number" class="table-input" placeholder="${day.plannedExercise}" value="${day.actualExercise || ""}" oninput="updateData(${index}, 'actualExercise', this.value)">`;
        } else {
          tdIntake.innerHTML = `<span style="color:#ccc;">-</span>`;
          tdExercise.innerHTML = `<span style="color:#ccc;">-</span>`;
          day.actualIntake = null;
          day.actualExercise = null;
        }
      }

      function updateData(index, field, value) {
        scheduleData[index][field] = value;
        syncToSavedRecords(index);
        calculateProjections();
      }

      function updateWeight(index, value) {
        scheduleData[index].actualWeight = value;
        syncToSavedRecords(index);
        calculateProjections();
      }

      // 배열 데이터를 객체(로컬스토리지용)에 동기화
      function syncToSavedRecords(index) {
        let day = scheduleData[index];
        savedRecords[day.key] = {
          status: day.status,
          actualIntake: day.actualIntake,
          actualExercise: day.actualExercise,
          actualWeight: day.actualWeight,
        };
        saveToLocalStorage();
      }

      function calculateProjections() {
        let currentW = startWeight;

        scheduleData.forEach((day, index) => {
          let intake = day.plannedIntake;
          let exercise = day.plannedExercise;

          if (day.status === "success") {
            intake = day.plannedIntake;
            exercise = day.plannedExercise;
          } else if (day.status === "fail") {
            intake =
              day.actualIntake !== null && day.actualIntake !== ""
                ? parseInt(day.actualIntake)
                : day.plannedIntake;
            exercise =
              day.actualExercise !== null && day.actualExercise !== ""
                ? parseInt(day.actualExercise)
                : day.plannedExercise;
          }

          let totalBurn = baseTDEE + exercise;
          let dailyMargin = totalBurn - intake;
          let weightChange = dailyMargin / 7700;
          currentW -= weightChange;

          // 마진 출력
          const marginTd = document.getElementById(`margin-${index}`);
          if (dailyMargin > 0)
            marginTd.innerHTML = `<span class="deficit-positive">-${dailyMargin}</span>`;
          else if (dailyMargin < 0)
            marginTd.innerHTML = `<span class="deficit-negative">+${Math.abs(dailyMargin)}</span>`;
          else marginTd.innerText = "0";

          // 예상 체중 출력
          document.getElementById(`weight-${index}`).innerText =
            currentW.toFixed(2);

          // 오차 계산 로직 (실제 체중 - 예상 체중)
          const errorTd = document.getElementById(`error-${index}`);
          if (day.actualWeight !== null && day.actualWeight !== "") {
            let actual = parseFloat(day.actualWeight);
            let diff = actual - currentW;

            if (diff > 0) {
              errorTd.innerHTML = `<span class="error-bad">+${diff.toFixed(2)}kg</span>`; // 예상보다 덜 빠짐
            } else {
              errorTd.innerHTML = `<span class="error-good">${diff.toFixed(2)}kg</span>`; // 예상보다 더 빠짐!
            }
          } else {
            errorTd.innerText = "-";
          }
        });

        document.getElementById("res-final-weight").innerText =
          currentW.toFixed(2) + " kg";
      }
    </script>
  </body>
</html>
